</head>

<body class="font-body selection:bg-primary/30 bg-surface text-on-surface overflow-x-hidden">
  <script>
    (function () {
      var clearHash = function () {
        if (!window.location.hash) return;
        // 不清除 Supabase OAuth token（implicit flow 或 error）
        var h = window.location.hash;
        if (h.indexOf('access_token') !== -1 || h.indexOf('refresh_token') !== -1 || h.indexOf('error_description') !== -1) return;
        var cleanUrl = window.location.pathname + window.location.search;
        window.history.replaceState(window.history.state, document.title, cleanUrl);
      };

      var reset = function () {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        if (document.body) document.body.scrollTop = 0;
      };

      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      clearHash();
      reset();

      window.addEventListener('hashchange', function () {
        clearHash();
        reset();
      });
      window.addEventListener('pageshow', reset);
      window.addEventListener('load', function () {
        reset();
        requestAnimationFrame(reset);
        setTimeout(reset, 50);
      });
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
