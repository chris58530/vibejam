<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gray circle background -->
  <circle cx="50" cy="50" r="50" fill="#e8eaed"/>

  <!-- Main dark body/fur of beaver (lower half) -->
  <ellipse cx="50" cy="72" rx="28" ry="20" fill="#1a1a1a"/>

  <!-- White face area -->
  <ellipse cx="50" cy="45" rx="22" ry="24" fill="#ffffff"/>

  <!-- Dark top of head / fur -->
  <ellipse cx="50" cy="32" rx="22" ry="16" fill="#1a1a1a"/>

  <!-- Left ear -->
  <ellipse cx="31" cy="25" rx="8" ry="9" fill="#1a1a1a"/>

  <!-- Right ear -->
  <ellipse cx="69" cy="25" rx="8" ry="9" fill="#1a1a1a"/>

  <!-- White face patch (forehead) -->
  <ellipse cx="50" cy="38" rx="14" ry="11" fill="#ffffff"/>

  <!-- Dark nose area / muzzle -->
  <ellipse cx="50" cy="58" rx="13" ry="11" fill="#1a1a1a"/>

  <!-- White muzzle highlight -->
  <ellipse cx="53" cy="57" rx="7" ry="7" fill="#f0f0f0"/>

  <!-- Nose -->
  <ellipse cx="50" cy="52" rx="4" ry="3" fill="#2a2a2a"/>
  <ellipse cx="50" cy="51" rx="2.5" ry="1.5" fill="#1a1a1a"/>

  <!-- Left eye -->
  <circle cx="40" cy="44" r="3.5" fill="#1a1a1a"/>
  <circle cx="41" cy="43" r="1" fill="#ffffff"/>

  <!-- Right eye -->
  <circle cx="60" cy="44" r="3.5" fill="#1a1a1a"/>
  <circle cx="61" cy="43" r="1" fill="#ffffff"/>

  <!-- Beaver teeth -->
  <rect x="44" y="63" width="5" height="7" rx="1" fill="#f5f5f0"/>
  <rect x="51" y="63" width="5" height="7" rx="1" fill="#f5f5f0"/>
  <line x1="50" y1="63" x2="50" y2="70" stroke="#cccccc" stroke-width="0.5"/>

  <!-- Whiskers left -->
  <line x1="38" y1="57" x2="18" y2="53" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="60" x2="18" y2="60" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="63" x2="20" y2="67" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers right -->
  <line x1="62" y1="57" x2="82" y2="53" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="82" y2="60" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="62" y1="63" x2="80" y2="67" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
